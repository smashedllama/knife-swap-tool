<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="theme-color" content="#0d0d0d" media="(prefers-color-scheme:dark)">
<meta name="theme-color" content="#f5f5f7" media="(prefers-color-scheme:light)">
<meta property="og:type" content="website">
<meta property="og:site_name" content="BladeFlow">
<meta id="og-title" property="og:title" content="Knife Photos">
<meta id="og-image" property="og:image" content="">
<meta id="og-desc" property="og:description" content="View knife photos on BladeFlow">
<title>BladeFlow Gallery</title>
<link rel="icon" href="https://smashedllama.github.io/bladeflow/favicon.png" type="image/png">
<link rel="apple-touch-icon" href="https://smashedllama.github.io/bladeflow/favicon.png">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ── TOKENS ── */
:root{
  --bg:#0d0d0d;
  --surf:#1a1a1a;
  --surf2:#222;
  --surf3:#2c2c2e;
  --b1:rgba(255,255,255,.08);
  --b2:rgba(255,255,255,.05);
  --t1:#ffffff;
  --t2:rgba(255,255,255,.65);
  --t3:rgba(255,255,255,.35);
  --acc:#FF9500;
  --acc2:rgba(255,149,0,.18);
  --sh:0 2px 16px rgba(0,0,0,.6);
  --r:12px;
  --font:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;
}
@media(prefers-color-scheme:light){
  :root{
    --bg:#f2f2f7;
    --surf:#ffffff;
    --surf2:#f5f5f7;
    --surf3:#e5e5ea;
    --b1:rgba(0,0,0,.08);
    --b2:rgba(0,0,0,.05);
    --t1:#1d1d1f;
    --t2:rgba(0,0,0,.55);
    --t3:rgba(0,0,0,.35);
    --sh:0 2px 16px rgba(0,0,0,.14);
  }
}

html,body{height:100%;overflow:hidden}
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--t1);
  display:flex;flex-direction:column;
  height:100dvh;
  -webkit-font-smoothing:antialiased;
}

/* ── HEADER ── */
.hdr{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;
  background:var(--surf);
  border-bottom:.5px solid var(--b1);
  flex-shrink:0;z-index:10;
}
.brand{display:flex;align-items:center;gap:7px;text-decoration:none;flex-shrink:0}
.brand-icon{width:32px;height:32px;flex-shrink:0;border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center}
.brand-icon img{width:100%;height:100%;display:block;object-fit:cover}
.brand-name{font-size:14px;font-weight:700;color:var(--t1);letter-spacing:-.3px;white-space:nowrap}
.brand-sub{font-size:10px;font-weight:500;color:var(--t3);letter-spacing:.02em;white-space:nowrap}
.hdr-divider{width:.5px;height:28px;background:var(--b1);flex-shrink:0}
.hdr-info{flex:1;min-width:0;overflow:hidden}
.hdr-title{font-size:14px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-sub{font-size:11px;color:var(--t3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-user{font-size:12px;font-weight:500;color:var(--t2);white-space:nowrap;flex-shrink:0}

.mob-menu-btn{
  display:none;
  align-items:center;gap:5px;
  background:var(--surf3);border:none;
  border-radius:8px;
  color:var(--t2);font-size:12px;font-weight:600;
  font-family:var(--font);
  padding:6px 10px;cursor:pointer;
  white-space:nowrap;flex-shrink:0;
  transition:background .12s;
}
.mob-menu-btn:active{background:var(--b1)}
.mob-menu-btn .menu-ico{display:flex;align-items:center;justify-content:center;width:15px;height:15px}

/* ── MAIN LAYOUT ── */
.main{flex:1;display:flex;overflow:hidden;min-height:0}

/* ── SIDEBAR NAV ── */
.knife-nav{
  width:210px;flex-shrink:0;
  background:var(--surf);
  border-right:.5px solid var(--b1);
  overflow-y:auto;
  display:flex;flex-direction:column;
  padding:8px 6px;
  scrollbar-width:none;
}
.knife-nav::-webkit-scrollbar{display:none}
.knife-nav.single{display:none}
.nav-section-lbl{
  font-size:10px;font-weight:600;color:var(--t3);
  letter-spacing:.06em;text-transform:uppercase;
  padding:10px 10px 5px;
}

.nav-item{
  display:grid;
  grid-template-columns:22px 1fr auto;
  column-gap:8px;
  align-items:center;
  padding:8px 10px;border-radius:9px;
  cursor:pointer;border:none;
  background:transparent;text-align:left;
  font-family:var(--font);
  transition:background .12s;
  width:100%;
}
.nav-item:hover{background:var(--surf3)}
.nav-item.active{background:var(--acc2)}
.nav-item-ico{width:16px;height:16px;display:flex;align-items:center;justify-content:center;color:var(--t3);flex-shrink:0}
.nav-item.active .nav-item-ico{color:var(--acc)}
.nav-item-body{min-width:0;overflow:hidden}
.nav-item-name{
  display:block;
  font-size:12.5px;font-weight:500;color:var(--t2);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  line-height:1.3;
}
.nav-item.active .nav-item-name{color:var(--acc);font-weight:600}
.nav-item-meta{
  display:block;
  font-size:11px;color:var(--t3);margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.nav-item.active .nav-item-meta{color:var(--acc);opacity:.7}
.nav-badge{
  font-size:10px;font-weight:700;
  background:var(--surf3);color:var(--t3);
  border-radius:20px;padding:2px 7px;
  flex-shrink:0;white-space:nowrap;
}
.nav-item.active .nav-badge{background:var(--acc2);color:var(--acc)}

/* ── VIEWER AREA ── */
.viewer-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.viewer{
  flex:1;position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg);cursor:default;min-height:0;
}
.slide{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  padding:12px;
  opacity:0;transition:opacity .22s ease;pointer-events:none;
  touch-action:none;
}
.slide.active{opacity:1;pointer-events:auto}
.slide img{
  max-width:100%;max-height:100%;
  object-fit:contain;border-radius:4px;
  display:block;touch-action:none;
  user-select:none;-webkit-user-drag:none;
}
.slide-video-wrap{
  display:flex;flex-direction:column;
  width:100%;max-width:720px;
  border-radius:10px;overflow:hidden;
  background:#000;
}
.slide-video-wrap video{
  width:100%;max-height:calc(100vh - 180px);
  object-fit:contain;display:block;
}
.vid-ctrl{
  background:rgba(0,0,0,.82);
  padding:8px 12px;
  display:flex;align-items:center;gap:10px;
}
.vid-ctrl button{
  background:none;border:none;color:#fff;
  cursor:pointer;padding:0;line-height:1;
  flex-shrink:0;font-size:11px;font-weight:600;
  display:flex;align-items:center;gap:3px;
}
.vid-ctrl input[type=range]{
  flex:1;cursor:pointer;accent-color:#FF9500;
  height:3px;min-width:0;
}
.vid-ctrl .vid-time{
  font-size:10px;color:#ccc;
  flex-shrink:0;min-width:36px;text-align:right;
}
.zoom-indicator{
  position:absolute;bottom:52px;right:12px;
  background:rgba(0,0,0,.52);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  color:#fff;font-size:12px;font-weight:600;letter-spacing:.02em;
  padding:4px 10px;border-radius:20px;
  opacity:0;transition:opacity .18s;pointer-events:none;z-index:6;
}
.zoom-indicator.show{opacity:1}
.spinner{
  position:absolute;width:36px;height:36px;
  border:3px solid var(--b1);
  border-top-color:var(--acc);
  border-radius:50%;animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

.nav-arrow{
  position:absolute;top:50%;transform:translateY(-50%);
  background:rgba(0,0,0,.45);
  backdrop-filter:blur(12px) saturate(180%);
  -webkit-backdrop-filter:blur(12px) saturate(180%);
  border:.5px solid rgba(255,255,255,.15);
  color:white;width:44px;height:44px;border-radius:50%;
  font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:opacity .15s,background .15s,transform .15s;
  opacity:0;z-index:5;user-select:none;
}
.viewer:hover .nav-arrow{opacity:.8}
.nav-arrow:hover{opacity:1!important;background:rgba(0,0,0,.65)}
.nav-arrow:active{transform:translateY(-50%) scale(.93)}
.nav-arrow.hidden{display:none}
.nav-arrow.prev{left:14px}
.nav-arrow.next{right:14px}

.counter{
  position:absolute;top:12px;right:12px;
  background:rgba(0,0,0,.5);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border-radius:20px;padding:4px 11px;
  font-size:12px;font-weight:600;color:rgba(255,255,255,.9);
  letter-spacing:.02em;z-index:5;pointer-events:none;
}

/* ── THUMBNAIL STRIP ── */
.thumbs{
  display:flex;gap:6px;padding:10px 12px;
  background:var(--surf);border-top:.5px solid var(--b1);
  overflow-x:auto;flex-shrink:0;
  scrollbar-width:none;scroll-behavior:smooth;
}
.thumbs::-webkit-scrollbar{display:none}
.thumbs.hidden{display:none}
.thumb{
  width:58px;height:58px;flex-shrink:0;
  border-radius:8px;object-fit:cover;cursor:pointer;
  border:2px solid transparent;opacity:.55;
  transition:opacity .15s,border-color .15s,transform .15s;
  background:var(--surf2);
}
.thumb:hover{opacity:.85;transform:scale(1.04)}
.thumb.active{border-color:var(--acc);opacity:1}

/* ── DETAILS BAR ── */
.details-bar{
  background:var(--surf);
  border-top:.5px solid var(--b1);
  flex-shrink:0;
}
.details-bar.hidden{display:none}
.details-toggle{
  width:100%;
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 14px;
  background:none;border:none;cursor:pointer;
  font-family:var(--font);color:var(--t2);
  font-size:12px;font-weight:600;letter-spacing:.01em;
  transition:background .12s;
}
.details-toggle:hover{background:var(--surf2)}
.details-chevron{
  font-size:10px;color:var(--t3);
  transition:transform .2s ease;
  display:inline-block;
}
.details-toggle.open .details-chevron{transform:rotate(180deg)}
.details-content{
  display:none;
  padding:2px 14px 13px;
  grid-template-columns:1fr 1fr;
  gap:8px 20px;
}
.details-content.open{display:grid}
.detail-row{display:flex;flex-direction:column;gap:2px}
.detail-row.full{grid-column:1 / -1}
.detail-lbl{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.05em}
.detail-val{font-size:12.5px;color:var(--t1);line-height:1.4}

/* ── FOOTER ── */
.footer{
  display:flex;align-items:center;justify-content:center;
  padding:7px 14px;
  background:var(--surf);border-top:.5px solid var(--b1);
  flex-shrink:0;
}
.made-with{font-size:11px;color:var(--t3);white-space:nowrap;text-align:center}
.made-with a{color:var(--t2);text-decoration:none;font-weight:500}
.made-with a:hover{color:var(--acc)}

/* ── BOTTOM SHEET ── */
.sheet-backdrop{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.5);
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  z-index:50;opacity:0;transition:opacity .22s ease;
}
.sheet-backdrop.open{opacity:1}
.sheet{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--surf);
  border-radius:16px 16px 0 0;
  border-top:.5px solid var(--b1);
  z-index:51;
  transform:translateY(100%);
  transition:transform .28s cubic-bezier(.32,.72,0,1);
  max-height:70dvh;
  display:flex;flex-direction:column;overflow:hidden;
}
.sheet.open{transform:translateY(0)}
.sheet-handle{
  width:36px;height:4px;background:var(--b1);border-radius:2px;
  margin:10px auto 4px;flex-shrink:0;
}
.sheet-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 16px 10px;flex-shrink:0;
  border-bottom:.5px solid var(--b1);
}
.sheet-title{font-size:13px;font-weight:700;color:var(--t1);letter-spacing:-.01em}
.sheet-close{
  background:var(--surf3);border:none;border-radius:50%;
  width:26px;height:26px;color:var(--t3);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font);transition:background .12s;
}
.sheet-close:active{background:var(--b1)}
.sheet-items{overflow-y:auto;padding:8px 10px 20px;scrollbar-width:none}
.sheet-items::-webkit-scrollbar{display:none}
.sheet-section-lbl{
  font-size:10px;font-weight:600;color:var(--t3);
  letter-spacing:.06em;text-transform:uppercase;
  padding:10px 10px 5px;display:block;
}
.sheet-item{
  display:grid;grid-template-columns:22px 1fr auto;column-gap:10px;
  align-items:center;padding:11px 10px;border-radius:10px;
  cursor:pointer;border:none;background:transparent;text-align:left;
  font-family:var(--font);width:100%;transition:background .12s;
}
.sheet-item:hover,.sheet-item:active{background:var(--surf3)}
.sheet-item.active{background:var(--acc2)}
.sheet-item-ico{width:18px;height:18px;display:flex;align-items:center;justify-content:center;color:var(--t3);flex-shrink:0}
.sheet-item.active .sheet-item-ico{color:var(--acc)}
.sheet-item-body{min-width:0;overflow:hidden}
.sheet-item-name{
  display:block;font-size:14px;font-weight:500;color:var(--t2);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;
}
.sheet-item.active .sheet-item-name{color:var(--acc);font-weight:600}
.sheet-item-meta{
  display:block;font-size:12px;color:var(--t3);margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.sheet-item.active .sheet-item-meta{color:var(--acc);opacity:.7}
.sheet-badge{
  font-size:11px;font-weight:700;background:var(--surf3);color:var(--t3);
  border-radius:20px;padding:3px 8px;white-space:nowrap;
}
.sheet-item.active .sheet-badge{background:var(--acc2);color:var(--acc)}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:80px;left:50%;
  transform:translateX(-50%) translateY(12px);
  background:var(--t1);color:var(--bg);
  font-size:13px;font-weight:600;
  padding:9px 18px;border-radius:20px;
  box-shadow:var(--sh);opacity:0;
  transition:opacity .2s,transform .2s;
  pointer-events:none;z-index:100;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── ERROR ── */
.err-wrap{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:12px;text-align:center;padding:24px;color:var(--t2);
}
.err-icon{font-size:48px}
.err-title{font-size:18px;font-weight:600;color:var(--t1)}
.err-sub{font-size:14px;max-width:300px;line-height:1.5}

/* ── MOBILE ── */
@media(max-width:640px){
  .knife-nav{display:none!important}
  .mob-menu-btn{display:flex}
  .brand-name,.brand-sub{display:none}
  .hdr-divider{display:none}
  .hdr-user{display:none}
  .made-with{display:none}
  .nav-arrow{opacity:.7}
  .details-content.open{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <a class="brand" href="https://smashedllama.github.io/bladeflow/" target="_blank" title="BladeFlow">
    <div class="brand-icon"><img src="https://smashedllama.github.io/bladeflow/icon.svg" alt="BladeFlow"></div>
    <div>
      <div class="brand-name">BladeFlow</div>
      <div class="brand-sub">r/KNIFE_SWAP</div>
    </div>
  </a>
  <div class="hdr-divider"></div>
  <div class="hdr-info">
    <div class="hdr-title" id="hdr-title">Loading&hellip;</div>
    <div class="hdr-sub" id="hdr-sub"></div>
  </div>
  <span class="hdr-user" id="hdr-user"></span>
  <button class="mob-menu-btn" id="mob-menu-btn" onclick="openSheet()">
    <span class="menu-ico"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></span>
    <span id="mob-menu-lbl">Photos</span>
  </button>
</header>

<!-- MAIN: sidebar + viewer -->
<div class="main">

  <!-- SIDEBAR NAV (desktop) -->
  <nav class="knife-nav" id="knife-nav">
    <div id="nav-items"></div>
  </nav>

  <!-- VIEWER AREA -->
  <div class="viewer-area">
    <div class="viewer" id="viewer">
      <div class="spinner" id="spinner"></div>
      <div id="slides"></div>
      <button class="nav-arrow prev hidden" id="nav-prev" onclick="go(-1)" aria-label="Previous">&#8249;</button>
      <button class="nav-arrow next hidden" id="nav-next" onclick="go(1)" aria-label="Next">&#8250;</button>
      <div class="counter" id="counter" style="display:none"></div>
      <div class="zoom-indicator" id="zoom-indicator"></div>
    </div>
    <div class="thumbs hidden" id="thumbs"></div>
    <!-- DETAILS BAR -->
    <div class="details-bar hidden" id="details-bar">
      <button class="details-toggle" id="details-toggle" onclick="toggleDetails()">
        <span id="details-toggle-lbl">Knife Details</span>
        <span class="details-chevron" id="details-chevron">&#9660;</span>
      </button>
      <div class="details-content" id="details-content"></div>
    </div>
  </div>
</div>

<!-- FOOTER -->
<footer class="footer">
  <div class="made-with">Built by <a href="https://www.reddit.com/user/smashedllama2" target="_blank" rel="noopener">u/smashedllama2</a></div>
</footer>

<!-- BOTTOM SHEET -->
<div class="sheet-backdrop" id="sheet-backdrop" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-hdr">
    <span class="sheet-title">Gallery</span>
    <button class="sheet-close" onclick="closeSheet()">&times;</button>
  </div>
  <div class="sheet-items" id="sheet-items"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── ICONS ──────────────────────────────────────────────────────
function gico(name, size=16) {
  const paths = {
    image:`<rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/>`,
    camera:`<path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3z"/><circle cx="12" cy="13" r="3"/>`,
  };
  const d = paths[name]; if (!d) return '';
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${d}</svg>`;
}

// ─── HELPERS ────────────────────────────────────────────────────
function cdnImg(url,w,h,fit){if(!url||!url.includes("res.cloudinary.com"))return url;const t=`w_${w}${h?",h_"+h:""},c_${fit||"limit"},q_auto,f_auto`;return url.replace("/upload/",`/upload/${t}/`)}
function isCdnVideo(url){return url&&url.includes("res.cloudinary.com")&&(url.includes("/video/")||/\.(mp4|mov|avi|webm|mkv)$/i.test(url));}
function cdnVideoThumb(url,w,h){if(!url||!url.includes("res.cloudinary.com"))return null;const t=`so_0,w_${w||80},h_${h||55},c_fill,f_jpg`;return url.replace("/upload/",`/upload/${t}/`).replace(/\.[^.]+$/,".jpg");}
function cdnVideoMp4(url){if(!url||!url.includes("res.cloudinary.com"))return null;const t=`vc_h264,q_auto,f_mp4`;return url.replace("/upload/",`/upload/${t}/`).replace(/\.[^.]+$/,".mp4");}
const _galVidWasPlaying={};
function galVidPlayPause(id){const v=document.getElementById(id);if(!v)return;v.paused?v.play():v.pause();}
function galVidSkipBack(id){const v=document.getElementById(id);if(!v)return;v.currentTime=Math.max(0,v.currentTime-10);}
function galVidTimeUpdate(id){const v=document.getElementById(id);if(!v)return;const prog=document.getElementById(id+'-prog');const time=document.getElementById(id+'-time');if(prog&&v.duration)prog.value=(v.currentTime/v.duration)*100;if(time){const s=Math.floor(v.currentTime);time.textContent=Math.floor(s/60)+':'+(s%60<10?'0':'')+(s%60);}}
function galVidState(id,playing){const btn=document.getElementById(id+'-btn');if(btn)btn.textContent=playing?'⏸':'▶';}
function galVidSeekStart(id){const v=document.getElementById(id);_galVidWasPlaying[id]=v&&!v.paused;if(v)v.pause();}
function galVidSeekEnd(id,val){const v=document.getElementById(id);if(!v||!v.duration)return;v.currentTime=(val/100)*v.duration;if(_galVidWasPlaying[id])v.play();}
function galVidActivate(vid_id,url,mp4,thumb){
  const poster=document.getElementById(vid_id+'-poster');
  const player=document.getElementById(vid_id+'-player');
  if(!poster||!player)return;
  player.innerHTML=`
    <video id="${vid_id}"${thumb?` poster="${thumb}"`:''}
      style="width:100%;max-height:calc(100vh - 180px);object-fit:contain;display:block"
      playsinline preload="auto" autoplay
      ontimeupdate="galVidTimeUpdate('${vid_id}')"
      onplay="galVidState('${vid_id}',true)"
      onpause="galVidState('${vid_id}',false)"
      onended="galVidState('${vid_id}',false)">
      <source src="${url}" type="video/webm">
      ${mp4?`<source src="${mp4}" type="video/mp4">`:''}
    </video>
    <div class="vid-ctrl">
      <button id="${vid_id}-btn" onclick="galVidPlayPause('${vid_id}')">▶</button>
      <button onclick="galVidSkipBack('${vid_id}')">↩ 10s</button>
      <input type="range" id="${vid_id}-prog" min="0" max="100" step="0.1" value="0"
        onmousedown="galVidSeekStart('${vid_id}')" ontouchstart="galVidSeekStart('${vid_id}')"
        onchange="galVidSeekEnd('${vid_id}',this.value)">
      <span id="${vid_id}-time" class="vid-time">0:00</span>
    </div>`;
  poster.style.display='none';
  player.style.display='block';
}

// ─── STATE ──────────────────────────────────────────────────────
// section: {label, ico, imgs, price, details, isTimestamp}
let sections = [];
let curSection = 0;
let curSlide = 0;
let galleryUser = "";
let detailsOpen = false;
let dragStartX = 0;
// ─── ZOOM / PAN STATE ───────────────────────────────────────────
let zoom = 1, panX = 0, panY = 0;
const ZOOM_MIN = 1, ZOOM_MAX = 5;
let _panning = false, _panSX = 0, _panSY = 0, _panPX = 0, _panPY = 0;
let _pinchDist = 0;
let _lastTap = 0, _swipeStartX = 0, _wasZoomedOnSwipeStart = false;
let _zoomIndTimer = null;

// ─── PARSE + INIT ───────────────────────────────────────────────
function init() {
  const params = new URLSearchParams(location.search);
  const raw = params.get('d');
  if (!raw) { showError('No gallery data found.'); return; }

  try {
    const json = decodeURIComponent(escape(atob(raw)));
    const data = JSON.parse(json);

    if (data.knives) {
      // Multi-knife format: {user, knives:[{name,price,imgs,details}], timestamp:[], startAt:N}
      galleryUser = data.user || "";
      const ts = (data.timestamp || []).filter(Boolean);
      if (ts.length) {
        sections.push({ label: "Timestamp", ico: gico('camera', 16), imgs: ts, price: "", details: null, isTimestamp: true });
      }
      (data.knives || []).forEach(k => {
        const imgs = (k.imgs || []).filter(Boolean);
        if (imgs.length) {
          sections.push({ label: k.name || "Knife", ico: gico('image', 16), imgs, price: k.price || "", details: k.details || null, isTimestamp: false, isGear: !!k.isGear });
        }
      });
      curSection = Math.max(0, Math.min(typeof data.startAt === 'number' ? data.startAt : 0, Math.max(0, sections.length - 1)));
    } else {
      // Single-knife format: {knife, price, user, imgs, details}
      galleryUser = data.user || "";
      const imgs = (data.imgs || []).filter(Boolean);
      if (!imgs.length) { showError('No photos in this gallery.'); return; }
      sections.push({ label: data.knife || "Knife Photos", ico: gico('image', 16), imgs, price: data.price || "", details: data.details || null, isTimestamp: false });
    }
  } catch(e) {
    showError('Could not load gallery data.');
    return;
  }

  if (!sections.length) { showError('No photos in this gallery.'); return; }

  // OG meta
  const firstSec = sections[curSection] || sections[0];
  document.getElementById('og-title').content = firstSec.label;
  document.getElementById('og-image').content = firstSec.imgs[0] || '';
  const totalPhotos = sections.reduce((n, s) => n + s.imgs.length, 0);
  document.getElementById('og-desc').content = `${totalPhotos} photo${totalPhotos > 1 ? 's' : ''} — ${sections.map(s => s.label).join(', ')}`;
  document.title = sections.map(s => s.label).join(' | ') + ' — BladeFlow Gallery';

  if (galleryUser) document.getElementById('hdr-user').textContent = 'u/' + galleryUser;

  buildNav();
  loadSection(curSection, false);

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(1);
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') go(-1);
    if (e.key === 'Escape') { if (zoom > 1) { resetZoom(); return; } closeSheet(); if (detailsOpen) toggleDetails(); }
    if (e.key === 'Tab') { e.preventDefault(); selectSection((curSection + 1) % sections.length); }
    if (e.key === '[') selectSection(Math.max(0, curSection - 1));
    if (e.key === ']') selectSection(Math.min(sections.length - 1, curSection + 1));
  });
  // Viewer event listeners (passive:false needed for preventDefault in wheel/touch)
  const vEl = document.getElementById('viewer');
  vEl.addEventListener('mousedown', onDragStart);
  vEl.addEventListener('dblclick', onViewerDblClick);
  vEl.addEventListener('wheel', onViewerWheel, { passive: false });
  vEl.addEventListener('touchstart', onTouchStart, { passive: false });
  vEl.addEventListener('touchmove', onTouchMove, { passive: false });
  vEl.addEventListener('touchend', onTouchEnd);
}

// ─── NAV ────────────────────────────────────────────────────────
function buildNav() {
  const navItemsEl = document.getElementById('nav-items');
  const sheetItemsEl = document.getElementById('sheet-items');
  const single = sections.length <= 1;

  if (single) {
    document.getElementById('knife-nav').classList.add('single');
    document.getElementById('mob-menu-btn').style.display = 'none';
  }

  // Group: timestamp first, then knives, then gear
  const tsIdxs = sections.map((s,i) => s.isTimestamp ? i : -1).filter(i => i >= 0);
  const knifeIdxs = sections.map((s,i) => !s.isTimestamp && !s.isGear ? i : -1).filter(i => i >= 0);
  const gearIdxs = sections.map((s,i) => s.isGear ? i : -1).filter(i => i >= 0);

  function addLabel(el, text) {
    const lbl = document.createElement('div');
    lbl.className = 'nav-section-lbl';
    lbl.textContent = text;
    el.appendChild(lbl);
  }
  function addSheetLabel(el, text) {
    const lbl = document.createElement('span');
    lbl.className = 'sheet-section-lbl';
    lbl.textContent = text;
    el.appendChild(lbl);
  }

  if (!single) {
    if (tsIdxs.length) addLabel(navItemsEl, 'Timestamp');
    tsIdxs.forEach(i => addNavItem(navItemsEl, i));
    if (knifeIdxs.length) addLabel(navItemsEl, knifeIdxs.length === 1 ? 'Knife' : 'Knives');
    knifeIdxs.forEach(i => addNavItem(navItemsEl, i));
    if (gearIdxs.length) addLabel(navItemsEl, 'Gear');
    gearIdxs.forEach(i => addNavItem(navItemsEl, i));

    if (tsIdxs.length) addSheetLabel(sheetItemsEl, 'Timestamp');
    tsIdxs.forEach(i => addSheetItem(sheetItemsEl, i));
    if (knifeIdxs.length) addSheetLabel(sheetItemsEl, knifeIdxs.length === 1 ? 'Knife' : 'Knives');
    knifeIdxs.forEach(i => addSheetItem(sheetItemsEl, i));
    if (gearIdxs.length) addSheetLabel(sheetItemsEl, 'Gear');
    gearIdxs.forEach(i => addSheetItem(sheetItemsEl, i));
  } else {
    sections.forEach((_, i) => { addNavItem(navItemsEl, i); addSheetItem(sheetItemsEl, i); });
  }

  updateMenuBtn();
}

function addNavItem(parent, i) {
  const s = sections[i];
  const btn = document.createElement('button');
  btn.className = 'nav-item' + (i === curSection ? ' active' : '');
  btn.id = `nav-item-${i}`;
  btn.innerHTML =
    `<span class="nav-item-ico">${s.ico}</span>` +
    `<span class="nav-item-body">` +
      `<span class="nav-item-name">${esc(s.label)}</span>` +
      (s.price ? `<span class="nav-item-meta">${esc(s.price)}</span>` : '') +
    `</span>` +
    `<span class="nav-badge">${s.imgs.length}</span>`;
  btn.onclick = () => selectSection(i);
  parent.appendChild(btn);
}

function addSheetItem(parent, i) {
  const s = sections[i];
  const si = document.createElement('button');
  si.className = 'sheet-item' + (i === curSection ? ' active' : '');
  si.id = `sheet-item-${i}`;
  si.innerHTML =
    `<span class="sheet-item-ico">${s.ico}</span>` +
    `<span class="sheet-item-body">` +
      `<span class="sheet-item-name">${esc(s.label)}</span>` +
      (s.price ? `<span class="sheet-item-meta">${esc(s.price)}</span>` : '') +
    `</span>` +
    `<span class="sheet-badge">${s.imgs.length} photo${s.imgs.length !== 1 ? 's' : ''}</span>`;
  si.onclick = () => { selectSection(i); closeSheet(); };
  parent.appendChild(si);
}

function updateMenuBtn() {
  const s = sections[curSection];
  if (s) document.getElementById('mob-menu-lbl').textContent = s.label;
}

function selectSection(idx) {
  if (idx < 0 || idx >= sections.length) return;
  const prevNav = document.getElementById(`nav-item-${curSection}`);
  const prevSheet = document.getElementById(`sheet-item-${curSection}`);
  if (prevNav) prevNav.classList.remove('active');
  if (prevSheet) prevSheet.classList.remove('active');
  curSection = idx;
  const newNav = document.getElementById(`nav-item-${curSection}`);
  const newSheet = document.getElementById(`sheet-item-${curSection}`);
  if (newNav) { newNav.classList.add('active'); newNav.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
  if (newSheet) newSheet.classList.add('active');
  updateMenuBtn();
  // Close details when switching sections
  if (detailsOpen) { detailsOpen = false; syncDetailsUI(); }
  loadSection(curSection, true);
}

// ─── DETAILS BAR ────────────────────────────────────────────────
function toggleDetails() {
  detailsOpen = !detailsOpen;
  syncDetailsUI();
}

function syncDetailsUI() {
  const toggle = document.getElementById('details-toggle');
  const content = document.getElementById('details-content');
  if (detailsOpen) {
    toggle.classList.add('open');
    content.classList.add('open');
  } else {
    toggle.classList.remove('open');
    content.classList.remove('open');
  }
}

function buildDetailsContent(details) {
  if (!details) return '';
  const rows = [];
  const row = (lbl, val, full) => val ? `<div class="detail-row${full?' full':''}"><span class="detail-lbl">${lbl}</span><span class="detail-val">${esc(val)}</span></div>` : '';
  rows.push(row('Steel', details.steel));
  rows.push(row('Condition', details.condition));
  rows.push(row('Owners', details.owners));
  const useVals = [details.carried==='Yes'?'Carried':null, details.cut==='Yes'?'Used to cut':null, details.sharpened==='Yes'?'Sharpened':null].filter(Boolean);
  rows.push(row('Usage', useVals.length ? useVals.join(', ') : 'Not carried or used'));
  rows.push(row('Centering', details.centering));
  rows.push(row('Lockup', details.lockupNotes ? details.lockup + ' - ' + details.lockupNotes : details.lockup));
  rows.push(row('Issues', details.issues));
  rows.push(row('Accessories', details.accessories));
  if (details.notes) rows.push(row('Notes', details.notes, true));
  return rows.filter(Boolean).join('');
}

function updateDetailsBar(s) {
  const bar = document.getElementById('details-bar');
  const content = document.getElementById('details-content');
  const lbl = document.getElementById('details-toggle-lbl');
  if (!s || s.isTimestamp || !s.details) {
    bar.classList.add('hidden');
    return;
  }
  bar.classList.remove('hidden');
  lbl.textContent = 'Knife Details' + (s.price ? ' - ' + s.price : '');
  content.innerHTML = buildDetailsContent(s.details);
}

// ─── BOTTOM SHEET ────────────────────────────────────────────────
function openSheet() {
  const backdrop = document.getElementById('sheet-backdrop');
  const sheet = document.getElementById('sheet');
  backdrop.style.display = 'block';
  requestAnimationFrame(() => { backdrop.classList.add('open'); sheet.classList.add('open'); });
}

function closeSheet() {
  const backdrop = document.getElementById('sheet-backdrop');
  const sheet = document.getElementById('sheet');
  backdrop.classList.remove('open');
  sheet.classList.remove('open');
  setTimeout(() => { backdrop.style.display = 'none'; }, 280);
}

// ─── SECTION LOADER ─────────────────────────────────────────────
function loadSection(idx, animate) {
  curSection = idx;
  curSlide = 0;
  const s = sections[idx];
  if (!s) return;

  document.getElementById('hdr-title').textContent = s.label;
  const subParts = [];
  if (s.price) subParts.push(s.price);
  if (galleryUser) subParts.push('u/' + galleryUser);
  document.getElementById('hdr-sub').textContent = subParts.join(' - ');

  const slidesEl = document.getElementById('slides');
  slidesEl.innerHTML = '';
  slidesEl.style.cssText = 'position:absolute;inset:0;display:flex;align-items:center;justify-content:center';

  const thumbsEl = document.getElementById('thumbs');
  thumbsEl.innerHTML = '';
  thumbsEl.classList.add('hidden');

  s.imgs.forEach((url, i) => {
    const slide = document.createElement('div');
    slide.className = 'slide';
    slide.id = `slide-${i}`;
    const isVid = isCdnVideo(url);

    if (isVid) {
      const vid_id = `galvid-${curSection}-${i}`;
      const thumb = cdnVideoThumb(url, 900, 600);
      const mp4 = cdnVideoMp4(url);
      const wrap = document.createElement('div');
      wrap.className = 'slide-video-wrap';
      // Poster + play overlay — video bytes only fetched when viewer taps play
      wrap.innerHTML = `
        <div id="${vid_id}-poster" style="position:relative;cursor:pointer;background:#000;border-radius:8px;overflow:hidden" onclick="galVidActivate('${vid_id}','${url}','${mp4||''}','${thumb||''}')">
          ${thumb ? `<img src="${thumb}" style="width:100%;max-height:calc(100vh - 180px);object-fit:contain;display:block" draggable="false">` : `<div style="height:240px;background:#111"></div>`}
          <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none">
            <div style="background:rgba(0,0,0,.62);backdrop-filter:blur(4px);border-radius:50%;width:68px;height:68px;display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,.25)">
              <span style="font-size:28px;color:#fff;margin-left:5px">▶</span>
            </div>
          </div>
        </div>
        <div id="${vid_id}-player" style="display:none"></div>`;
      slide.appendChild(wrap);
      if (i === curSlide) document.getElementById('spinner').style.display = 'none';
    } else {
      const img = document.createElement('img');
      const optimized = cdnImg(url, 2400, 0, 'limit');
      img.dataset.src = optimized;
      if (i === 0) img.src = optimized;
      img.alt = `${s.label} photo ${i + 1}`;
      img.draggable = false;
      img.addEventListener('load', () => { if (i === curSlide) document.getElementById('spinner').style.display = 'none'; });
      img.addEventListener('error', () => {
        img.alt = 'Could not load photo';
        img.style.cssText = 'width:80px;height:80px;opacity:.3';
        if (i === curSlide) document.getElementById('spinner').style.display = 'none';
      });
      slide.appendChild(img);
    }

    slidesEl.appendChild(slide);

    if (s.imgs.length > 1) {
      const t = document.createElement(isVid ? 'div' : 'img');
      t.className = 'thumb' + (i === 0 ? ' active' : '');
      if (isVid) {
        const vthumb = cdnVideoThumb(url, 80, 55);
        t.style.cssText = 'position:relative;display:inline-flex;align-items:center;justify-content:center;overflow:hidden;border-radius:4px;';
        t.innerHTML = vthumb
          ? `<img src="${vthumb}" style="width:100%;height:100%;object-fit:cover;display:block" draggable="false"><span style="position:absolute;font-size:14px;text-shadow:0 1px 4px rgba(0,0,0,.7)">▶</span>`
          : `<span style="font-size:18px">🎥</span>`;
      } else {
        t.src = cdnImg(url, 80, 55, 'fill');
        t.alt = `Thumb ${i + 1}`;
        t.draggable = false;
      }
      t.addEventListener('click', () => showSlide(i));
      thumbsEl.appendChild(t);
    }
  });

  if (s.imgs.length > 1) thumbsEl.classList.remove('hidden');
  updateDetailsBar(s);
  showSlide(0, false);
}

// ─── SLIDES ─────────────────────────────────────────────────────
function showSlide(n, animate = true) {
  resetZoom();
  const imgs = sections[curSection]?.imgs || [];
  const prev = document.getElementById(`slide-${curSlide}`);
  const prevThumb = document.querySelectorAll('.thumb')[curSlide];
  if (prev) prev.classList.remove('active');
  if (prevThumb) prevThumb.classList.remove('active');
  curSlide = Math.max(0, Math.min(n, imgs.length - 1));
  document.getElementById('spinner').style.display = 'flex';
  const next = document.getElementById(`slide-${curSlide}`);
  const nextThumb = document.querySelectorAll('.thumb')[curSlide];
  if (next) next.classList.add('active');
  if (nextThumb) { nextThumb.classList.add('active'); nextThumb.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' }); }
  // Pause any video on the slide we just left
  prev?.querySelector('video')?.pause();
  const img = next?.querySelector('img');
  const vid = next?.querySelector('video');
  // Load deferred image slide on demand
  if (img && !img.src && img.dataset.src) img.src = img.dataset.src;
  // Prefetch adjacent image slides so swipes feel instant
  [-1, 1].forEach(d => {
    const adj = document.getElementById(`slide-${curSlide + d}`)?.querySelector('img');
    if (adj && !adj.src && adj.dataset.src) adj.src = adj.dataset.src;
  });
  // Video slides don't need the spinner
  if (vid) document.getElementById('spinner').style.display = 'none';
  else if (img?.complete && img?.naturalHeight) document.getElementById('spinner').style.display = 'none';
  updateArrows();
  const c = document.getElementById('counter');
  if (imgs.length > 1) { c.style.display = 'block'; c.textContent = `${curSlide + 1} / ${imgs.length}`; }
  else { c.style.display = 'none'; }
}

function go(dir) {
  const imgs = sections[curSection]?.imgs || [];
  const n = curSlide + dir;
  if (n < 0 || n >= imgs.length) return;
  showSlide(n);
}

function updateArrows() {
  const imgs = sections[curSection]?.imgs || [];
  const prev = document.getElementById('nav-prev');
  const next = document.getElementById('nav-next');
  if (imgs.length > 1) {
    prev.classList.remove('hidden'); next.classList.remove('hidden');
    prev.style.opacity = curSlide === 0 ? '.2' : '';
    next.style.opacity = curSlide === imgs.length - 1 ? '.2' : '';
    prev.style.pointerEvents = curSlide === 0 ? 'none' : '';
    next.style.pointerEvents = curSlide === imgs.length - 1 ? 'none' : '';
  } else {
    prev.classList.add('hidden'); next.classList.add('hidden');
  }
}

// ─── ZOOM / PAN ──────────────────────────────────────────────────
function activeSlide() { return document.getElementById(`slide-${curSlide}`); }

function applyZoom() {
  const s = activeSlide(); if (!s) return;
  if (zoom <= 1) {
    zoom = 1; panX = 0; panY = 0;
    s.style.transform = ''; s.style.cursor = '';
    s.style.transformOrigin = ''; s.style.willChange = '';
  } else {
    s.style.transformOrigin = '0 0';
    s.style.willChange = 'transform';
    s.style.transform = `translate(${panX}px,${panY}px) scale(${zoom})`;
    s.style.cursor = _panning ? 'grabbing' : 'grab';
  }
  const ind = document.getElementById('zoom-indicator');
  if (ind) {
    if (zoom > 1) {
      ind.textContent = '×' + zoom.toFixed(1);
      ind.classList.add('show');
      clearTimeout(_zoomIndTimer);
      _zoomIndTimer = setTimeout(() => ind.classList.remove('show'), 1500);
    } else {
      clearTimeout(_zoomIndTimer);
      ind.classList.remove('show');
    }
  }
}

function clampPan() {
  const v = document.getElementById('viewer');
  const W = v.clientWidth, H = v.clientHeight;
  panX = Math.max(W - W * zoom, Math.min(0, panX));
  panY = Math.max(H - H * zoom, Math.min(0, panY));
}

function resetZoom() { zoom = 1; panX = 0; panY = 0; applyZoom(); }

function zoomAt(clientX, clientY, f) {
  const v = document.getElementById('viewer');
  const r = v.getBoundingClientRect();
  const vx = clientX - r.left, vy = clientY - r.top;
  const nz = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, zoom * f));
  const af = nz / zoom;
  panX = vx - (vx - panX) * af;
  panY = vy - (vy - panY) * af;
  zoom = nz;
  if (zoom <= 1) { zoom = 1; panX = 0; panY = 0; } else clampPan();
  applyZoom();
}

// ─── WHEEL (Mac trackpad pinch + desktop scroll/ctrl+wheel) ──────
function onViewerWheel(e) {
  e.preventDefault();
  if (e.ctrlKey) {
    // Mac trackpad pinch gesture or Ctrl+scroll → zoom toward cursor
    const capped = Math.max(-30, Math.min(30, e.deltaY));
    zoomAt(e.clientX, e.clientY, Math.exp(-capped * 0.025));
  } else if (zoom > 1) {
    // Two-finger scroll when zoomed → pan
    panX -= e.deltaX; panY -= e.deltaY;
    clampPan(); applyZoom();
  } else if (Math.abs(e.deltaX) > Math.abs(e.deltaY) && Math.abs(e.deltaX) > 15) {
    // Horizontal trackpad swipe → navigate slides
    go(e.deltaX > 0 ? 1 : -1);
  }
}

// ─── DOUBLE CLICK ────────────────────────────────────────────────
function onViewerDblClick(e) {
  if (zoom > 1) resetZoom(); else zoomAt(e.clientX, e.clientY, 3);
}

// ─── TOUCH ───────────────────────────────────────────────────────
function _dist2(t) { return Math.hypot(t[0].clientX - t[1].clientX, t[0].clientY - t[1].clientY); }
function _mid2(t) { return { x: (t[0].clientX + t[1].clientX) / 2, y: (t[0].clientY + t[1].clientY) / 2 }; }

function onTouchStart(e) {
  if (e.touches.length === 2) {
    e.preventDefault(); _panning = false; _pinchDist = _dist2(e.touches); return;
  }
  const t = e.touches[0];
  _swipeStartX = t.clientX; _wasZoomedOnSwipeStart = zoom > 1;
  // Double-tap to zoom/reset
  const now = Date.now();
  if (now - _lastTap < 300) {
    e.preventDefault();
    if (zoom > 1) resetZoom(); else zoomAt(t.clientX, t.clientY, 3);
    _lastTap = 0; return;
  }
  _lastTap = now;
  if (zoom > 1) {
    _panning = true;
    _panSX = t.clientX; _panSY = t.clientY; _panPX = panX; _panPY = panY;
  }
}

function onTouchMove(e) {
  if (e.touches.length === 2) {
    e.preventDefault();
    const nd = _dist2(e.touches);
    if (_pinchDist > 0) { const m = _mid2(e.touches); zoomAt(m.x, m.y, nd / _pinchDist); }
    _pinchDist = nd; return;
  }
  if (_panning && e.touches.length === 1) {
    e.preventDefault();
    panX = _panPX + (e.touches[0].clientX - _panSX);
    panY = _panPY + (e.touches[0].clientY - _panSY);
    clampPan(); applyZoom();
  }
}

function onTouchEnd(e) {
  if (e.touches.length === 1) {
    // One finger remaining after pinch → transition to pan
    _pinchDist = 0;
    if (zoom > 1) {
      _panning = true;
      _panSX = e.touches[0].clientX; _panSY = e.touches[0].clientY;
      _panPX = panX; _panPY = panY;
    }
    return;
  }
  // All fingers up
  if (!_panning && !_wasZoomedOnSwipeStart && zoom <= 1) {
    const dx = (e.changedTouches[0]?.clientX ?? _swipeStartX) - _swipeStartX;
    if (Math.abs(dx) > 40) go(dx < 0 ? 1 : -1);
  }
  _panning = false; _pinchDist = 0; applyZoom();
}

// ─── MOUSE DRAG ──────────────────────────────────────────────────
function onDragStart(e) {
  if (e.button !== 0) return;
  if (zoom > 1) {
    _panning = true;
    _panSX = e.clientX; _panSY = e.clientY; _panPX = panX; _panPY = panY;
    const s = activeSlide(); if (s) s.style.cursor = 'grabbing';
    const onMove = mv => {
      mv.preventDefault();
      panX = _panPX + (mv.clientX - _panSX);
      panY = _panPY + (mv.clientY - _panSY);
      clampPan(); applyZoom();
    };
    const onUp = () => {
      _panning = false; applyZoom();
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    e.preventDefault(); return;
  }
  // Swipe-to-navigate when not zoomed
  dragStartX = e.clientX;
  const onUp = up => {
    const dx = up.clientX - dragStartX;
    if (Math.abs(dx) > 40) go(dx < 0 ? 1 : -1);
    window.removeEventListener('mouseup', onUp);
  };
  window.addEventListener('mouseup', onUp);
}

// ─── TOAST ──────────────────────────────────────────────────────
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ─── ERROR ──────────────────────────────────────────────────────
function showError(msg) {
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('knife-nav').classList.add('single');
  document.getElementById('mob-menu-btn').style.display = 'none';
  document.getElementById('viewer').innerHTML = `
    <div class="err-wrap">
      <div class="err-icon">📷</div>
      <div class="err-title">No Photos Found</div>
      <div class="err-sub">${msg}</div>
    </div>`;
}

// ─── UTIL ────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
