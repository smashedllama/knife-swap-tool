<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="theme-color" content="#0d0d0d" media="(prefers-color-scheme:dark)">
<meta name="theme-color" content="#f5f5f7" media="(prefers-color-scheme:light)">
<meta property="og:type" content="website">
<meta property="og:site_name" content="KnifeSwap Post Generator">
<meta id="og-title" property="og:title" content="Knife Photos">
<meta id="og-image" property="og:image" content="">
<meta id="og-desc" property="og:description" content="View knife photos on KnifeSwap Post Generator">
<title>KnifeSwap Gallery</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  /* ── TOKENS ── */
  :root{
    --bg:#0d0d0d;
    --surf:#1a1a1a;
    --surf2:#222;
    --b1:rgba(255,255,255,.08);
    --b2:rgba(255,255,255,.05);
    --t1:#ffffff;
    --t2:rgba(255,255,255,.65);
    --t3:rgba(255,255,255,.35);
    --acc:#FF9500;
    --acc2:rgba(255,149,0,.15);
    --sh:0 2px 12px rgba(0,0,0,.5);
    --r:12px;
    --font:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;
  }
  [data-theme="light"]{
    --bg:#f2f2f7;
    --surf:#ffffff;
    --surf2:#f5f5f7;
    --b1:rgba(0,0,0,.08);
    --b2:rgba(0,0,0,.05);
    --t1:#1d1d1f;
    --t2:rgba(0,0,0,.55);
    --t3:rgba(0,0,0,.35);
    --sh:0 2px 12px rgba(0,0,0,.12);
  }
  @media(prefers-color-scheme:light){
    :root:not([data-theme="dark"]){
      --bg:#f2f2f7;
      --surf:#ffffff;
      --surf2:#f5f5f7;
      --b1:rgba(0,0,0,.08);
      --b2:rgba(0,0,0,.05);
      --t1:#1d1d1f;
      --t2:rgba(0,0,0,.55);
      --t3:rgba(0,0,0,.35);
      --sh:0 2px 12px rgba(0,0,0,.12);
    }
  }

  html,body{height:100%;overflow:hidden}
  body{
    font-family:var(--font);
    background:var(--bg);
    color:var(--t1);
    display:flex;
    flex-direction:column;
    height:100dvh;
    -webkit-font-smoothing:antialiased;
    transition:background .25s,color .25s;
  }

  /* ── HEADER ── */
  .hdr{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 14px;
    background:var(--surf);
    border-bottom:.5px solid var(--b1);
    flex-shrink:0;
    position:relative;
    z-index:10;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:7px;
    text-decoration:none;
    flex-shrink:0;
  }
  .brand-icon{
    width:30px;height:30px;
    background:var(--acc);
    border-radius:8px;
    display:flex;align-items:center;justify-content:center;
    font-size:16px;
    flex-shrink:0;
  }
  .brand-name{
    font-size:14px;font-weight:700;
    color:var(--t1);letter-spacing:-.3px;
    white-space:nowrap;
  }
  .brand-sub{
    font-size:10px;font-weight:500;
    color:var(--t3);letter-spacing:.02em;
    white-space:nowrap;
  }
  .hdr-divider{width:.5px;height:28px;background:var(--b1);flex-shrink:0}
  .hdr-knife{flex:1;min-width:0;overflow:hidden}
  .hdr-knife-name{
    font-size:14px;font-weight:600;
    color:var(--t1);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .hdr-knife-price{
    font-size:12px;font-weight:600;
    color:var(--acc);margin-top:1px;
  }
  .hdr-right{
    display:flex;align-items:center;gap:6px;flex-shrink:0;
  }
  .hdr-user{
    font-size:12px;font-weight:500;color:var(--t2);
    white-space:nowrap;
  }
  .icon-btn{
    background:none;border:.5px solid var(--b1);
    color:var(--t2);
    width:32px;height:32px;border-radius:8px;
    cursor:pointer;font-size:15px;
    display:flex;align-items:center;justify-content:center;
    transition:background .15s,color .15s;
    flex-shrink:0;
  }
  .icon-btn:hover{background:var(--b1);color:var(--t1)}
  .icon-btn:active{background:var(--b2)}

  /* ── MAIN VIEWER ── */
  .viewer{
    flex:1;
    position:relative;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--bg);
    cursor:default;
    min-height:0;
  }

  .slide{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:12px;
    opacity:0;
    transition:opacity .25s ease;
    pointer-events:none;
  }
  .slide.active{opacity:1;pointer-events:auto}
  .slide.prev-out{opacity:0}
  .slide img{
    max-width:100%;max-height:100%;
    object-fit:contain;
    border-radius:4px;
    display:block;
    touch-action:pinch-zoom;
    user-select:none;
    -webkit-user-drag:none;
  }

  /* Spinner */
  .spinner{
    position:absolute;
    width:36px;height:36px;
    border:3px solid var(--b1);
    border-top-color:var(--acc);
    border-radius:50%;
    animation:spin .7s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}

  /* Nav arrows */
  .nav{
    position:absolute;
    top:50%;transform:translateY(-50%);
    background:rgba(0,0,0,.45);
    backdrop-filter:blur(12px) saturate(180%);
    -webkit-backdrop-filter:blur(12px) saturate(180%);
    border:.5px solid rgba(255,255,255,.15);
    color:white;
    width:44px;height:44px;border-radius:50%;
    font-size:20px;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:opacity .15s,background .15s,transform .15s;
    opacity:0;
    z-index:5;
    user-select:none;
  }
  .viewer:hover .nav{opacity:.8}
  .nav:hover{opacity:1!important;background:rgba(0,0,0,.65)}
  .nav:active{transform:translateY(-50%) scale(.93)}
  .nav.hidden{display:none}
  .nav-prev{left:14px}
  .nav-next{right:14px}

  /* Counter */
  .counter{
    position:absolute;
    top:12px;right:12px;
    background:rgba(0,0,0,.5);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    border-radius:20px;
    padding:4px 11px;
    font-size:12px;font-weight:600;
    color:rgba(255,255,255,.9);
    letter-spacing:.02em;
    z-index:5;
    pointer-events:none;
  }

  /* ── THUMBNAIL STRIP ── */
  .thumbs{
    display:flex;
    gap:6px;
    padding:10px 12px;
    background:var(--surf);
    border-top:.5px solid var(--b1);
    overflow-x:auto;
    flex-shrink:0;
    scrollbar-width:none;
    scroll-behavior:smooth;
  }
  .thumbs::-webkit-scrollbar{display:none}
  .thumbs.hidden{display:none}
  .thumb{
    width:58px;height:58px;flex-shrink:0;
    border-radius:8px;
    object-fit:cover;
    cursor:pointer;
    border:2px solid transparent;
    opacity:.55;
    transition:opacity .15s,border-color .15s,transform .15s;
    background:var(--surf2);
  }
  .thumb:hover{opacity:.85;transform:scale(1.04)}
  .thumb.active{border-color:var(--acc);opacity:1}

  /* ── FOOTER ── */
  .footer{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:8px 14px;
    background:var(--surf);
    border-top:.5px solid var(--b1);
    flex-shrink:0;
    gap:10px;
  }
  .footer-btns{display:flex;gap:6px}
  .footer-btn{
    display:flex;align-items:center;gap:5px;
    background:var(--surf2);
    border:.5px solid var(--b1);
    border-radius:8px;
    color:var(--t2);
    font-size:12px;font-weight:500;
    font-family:var(--font);
    padding:5px 10px;
    cursor:pointer;
    transition:background .15s,color .15s;
    white-space:nowrap;
  }
  .footer-btn:hover{background:var(--b1);color:var(--t1)}
  .footer-btn:active{background:var(--b2)}
  .footer-btn .ico{font-size:14px}
  .made-with{
    font-size:11px;color:var(--t3);
    white-space:nowrap;
    flex-shrink:0;
  }
  .made-with a{color:var(--t2);text-decoration:none;font-weight:500}
  .made-with a:hover{color:var(--acc)}

  /* ── TOAST ── */
  .toast{
    position:fixed;
    bottom:80px;left:50%;
    transform:translateX(-50%) translateY(12px);
    background:var(--t1);color:var(--bg);
    font-size:13px;font-weight:600;
    padding:9px 18px;border-radius:20px;
    box-shadow:var(--sh);
    opacity:0;
    transition:opacity .2s,transform .2s;
    pointer-events:none;
    z-index:100;
    white-space:nowrap;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* ── ERROR STATE ── */
  .err{
    flex:1;display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    gap:12px;text-align:center;padding:24px;
    color:var(--t2);
  }
  .err-icon{font-size:48px}
  .err-title{font-size:18px;font-weight:600;color:var(--t1)}
  .err-sub{font-size:14px;max-width:300px;line-height:1.5}

  /* ── MOBILE ── */
  @media(max-width:600px){
    .brand-sub,.hdr-knife-price{display:none}
    .hdr-divider{display:none}
    .footer-btn span{display:none}
    .footer-btn{padding:6px 8px}
    .nav{opacity:.7}
  }
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <a class="brand" href="https://smashedllama.github.io/knife-swap-tool/" target="_blank" title="KnifeSwap Post Generator">
    <div class="brand-icon">🔪</div>
    <div>
      <div class="brand-name">KnifeSwap</div>
      <div class="brand-sub">POST GENERATOR</div>
    </div>
  </a>
  <div class="hdr-divider"></div>
  <div class="hdr-knife">
    <div class="hdr-knife-name" id="hdr-name">Loading…</div>
    <div class="hdr-knife-price" id="hdr-price"></div>
  </div>
  <div class="hdr-right">
    <span class="hdr-user" id="hdr-user"></span>
    <button class="icon-btn" id="btn-theme" title="Toggle theme" onclick="toggleTheme()">☀️</button>
  </div>
</header>

<!-- VIEWER -->
<div class="viewer" id="viewer"
  onmousedown="onDragStart(event)"
  ontouchstart="onTouchStart(event)"
  ontouchend="onTouchEnd(event)">

  <div class="spinner" id="spinner"></div>
  <div id="slides"></div>
  <button class="nav nav-prev hidden" id="nav-prev" onclick="go(-1)" aria-label="Previous">‹</button>
  <button class="nav nav-next hidden" id="nav-next" onclick="go(1)" aria-label="Next">›</button>
  <div class="counter" id="counter" style="display:none"></div>
</div>

<!-- THUMBNAILS -->
<div class="thumbs hidden" id="thumbs"></div>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-btns">
    <button class="footer-btn" onclick="downloadCurrent()" title="Download photo">
      <span class="ico">↓</span><span>Download</span>
    </button>
    <button class="footer-btn" onclick="openCurrent()" title="Open full size">
      <span class="ico">⛶</span><span>Full size</span>
    </button>
    <button class="footer-btn" onclick="copyLink()" title="Copy gallery link" id="btn-copy">
      <span class="ico">🔗</span><span>Copy link</span>
    </button>
    <button class="footer-btn" id="btn-fs" onclick="toggleFullscreen()" title="Fullscreen">
      <span class="ico" id="fs-icon">⛶</span><span id="fs-label">Fullscreen</span>
    </button>
  </div>
  <div class="made-with">Made with <a href="https://smashedllama.github.io/knife-swap-tool/" target="_blank">KnifeSwap</a></div>
</footer>

<div class="toast" id="toast"></div>

<script>
// ─── PARSE DATA ───────────────────────────────────────────────
let imgs = [], knifeInfo = {};
let cur = 0;
let dragStartX = 0, touchStartX = 0;

function init() {
  const params = new URLSearchParams(location.search);
  const raw = params.get('d');
  if (!raw) { showError('No gallery data found.'); return; }

  try {
    const json = decodeURIComponent(escape(atob(raw)));
    knifeInfo = JSON.parse(json);
    imgs = (knifeInfo.imgs || []).filter(Boolean);
  } catch(e) {
    showError('Could not load gallery data.');
    return;
  }

  if (!imgs.length) { showError('No photos in this gallery.'); return; }

  // OG meta
  document.getElementById('og-title').content = knifeInfo.knife || 'Knife Photos';
  document.getElementById('og-image').content = imgs[0] || '';
  document.getElementById('og-desc').content =
    `${imgs.length} photo${imgs.length>1?'s':''} — ${knifeInfo.knife||''}${knifeInfo.price?' | '+knifeInfo.price:''}`;
  document.title = (knifeInfo.knife || 'Knife Photos') + ' — KnifeSwap Gallery';

  // Header
  document.getElementById('hdr-name').textContent = knifeInfo.knife || 'Knife Photos';
  if (knifeInfo.price) document.getElementById('hdr-price').textContent = knifeInfo.price;
  if (knifeInfo.user) document.getElementById('hdr-user').textContent = 'u/' + knifeInfo.user;

  buildSlides();
  buildThumbs();
  showSlide(0, false);
  updateNav();

  // Keyboard
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(1);
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') go(-1);
    if (e.key === 'Escape') history.back();
    if (e.key === 'f' || e.key === 'F') toggleFullscreen();
  });

  // Fullscreen change
  document.addEventListener('fullscreenchange', updateFsBtn);

  // Theme
  initTheme();
}

// ─── SLIDES ──────────────────────────────────────────────────
function buildSlides() {
  const container = document.getElementById('slides');
  container.style.cssText = 'position:absolute;inset:0;display:flex;align-items:center;justify-content:center';
  imgs.forEach((url, i) => {
    const slide = document.createElement('div');
    slide.className = 'slide';
    slide.id = `slide-${i}`;
    const img = document.createElement('img');
    img.src = url;
    img.alt = `Photo ${i+1}`;
    img.draggable = false;
    img.addEventListener('load', () => {
      if (i === cur) document.getElementById('spinner').style.display = 'none';
    });
    img.addEventListener('error', () => {
      img.alt = '⚠ Could not load photo';
      img.style.cssText = 'width:80px;height:80px;opacity:.3';
    });
    slide.appendChild(img);
    container.appendChild(slide);
  });
}

function buildThumbs() {
  if (imgs.length < 2) return;
  const strip = document.getElementById('thumbs');
  strip.classList.remove('hidden');
  imgs.forEach((url, i) => {
    const img = document.createElement('img');
    img.className = 'thumb' + (i===0?' active':'');
    img.src = url;
    img.alt = `Thumb ${i+1}`;
    img.draggable = false;
    img.addEventListener('click', () => showSlide(i));
    strip.appendChild(img);
  });
}

function showSlide(n, animate = true) {
  const prev = document.getElementById(`slide-${cur}`);
  const prevThumb = document.querySelectorAll('.thumb')[cur];
  if (prev) prev.classList.remove('active');
  if (prevThumb) prevThumb.classList.remove('active');

  cur = Math.max(0, Math.min(n, imgs.length - 1));
  document.getElementById('spinner').style.display = 'flex';

  const next = document.getElementById(`slide-${cur}`);
  const nextThumb = document.querySelectorAll('.thumb')[cur];
  if (next) next.classList.add('active');
  if (nextThumb) {
    nextThumb.classList.add('active');
    nextThumb.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  }

  // Check if already loaded
  const img = next?.querySelector('img');
  if (img?.complete && img?.naturalHeight) {
    document.getElementById('spinner').style.display = 'none';
  }

  updateNav();

  const c = document.getElementById('counter');
  if (imgs.length > 1) {
    c.style.display = 'block';
    c.textContent = `${cur+1} / ${imgs.length}`;
  }
}

function go(dir) {
  const n = cur + dir;
  if (n < 0 || n >= imgs.length) return;
  showSlide(n);
}

function updateNav() {
  const prev = document.getElementById('nav-prev');
  const next = document.getElementById('nav-next');
  if (imgs.length > 1) {
    prev.classList.remove('hidden');
    next.classList.remove('hidden');
    prev.style.opacity = cur === 0 ? '.2' : '';
    next.style.opacity = cur === imgs.length-1 ? '.2' : '';
    prev.style.pointerEvents = cur === 0 ? 'none' : '';
    next.style.pointerEvents = cur === imgs.length-1 ? 'none' : '';
  }
}

// ─── TOUCH / SWIPE ───────────────────────────────────────────
function onTouchStart(e) { touchStartX = e.touches[0].clientX; }
function onTouchEnd(e) {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 40) go(dx < 0 ? 1 : -1);
}

function onDragStart(e) {
  dragStartX = e.clientX;
  const onUp = up => {
    const dx = up.clientX - dragStartX;
    if (Math.abs(dx) > 40) go(dx < 0 ? 1 : -1);
    window.removeEventListener('mouseup', onUp);
  };
  window.addEventListener('mouseup', onUp);
}

// ─── ACTIONS ─────────────────────────────────────────────────
function downloadCurrent() {
  const url = imgs[cur];
  if (!url) return;
  const a = document.createElement('a');
  a.href = url;
  a.download = `knife-photo-${cur+1}.jpg`;
  a.target = '_blank';
  a.click();
}

function openCurrent() {
  window.open(imgs[cur], '_blank');
}

function copyLink() {
  navigator.clipboard.writeText(location.href).then(() => {
    toast('Gallery link copied!');
  }).catch(() => {
    toast('Copy failed — try manually');
  });
}

function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen?.();
  } else {
    document.exitFullscreen?.();
  }
}

function updateFsBtn() {
  const on = !!document.fullscreenElement;
  document.getElementById('fs-icon').textContent = on ? '⊡' : '⛶';
  document.getElementById('fs-label').textContent = on ? 'Exit' : 'Fullscreen';
}

// ─── THEME ───────────────────────────────────────────────────
function initTheme() {
  const saved = localStorage.getItem('ks-gallery-theme');
  if (saved) document.documentElement.setAttribute('data-theme', saved);
  updateThemeBtn();
}

function toggleTheme() {
  const html = document.documentElement;
  const cur = html.getAttribute('data-theme');
  const sys = window.matchMedia('(prefers-color-scheme:light)').matches ? 'light' : 'dark';
  const next = (cur === 'dark' || (!cur && sys === 'dark')) ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('ks-gallery-theme', next);
  updateThemeBtn();
}

function updateThemeBtn() {
  const html = document.documentElement;
  const cur = html.getAttribute('data-theme');
  const sys = window.matchMedia('(prefers-color-scheme:light)').matches ? 'light' : 'dark';
  const isDark = cur === 'dark' || (!cur && sys === 'dark');
  document.getElementById('btn-theme').textContent = isDark ? '☀️' : '🌙';
  document.getElementById('btn-theme').title = isDark ? 'Switch to light mode' : 'Switch to dark mode';
}

// ─── TOAST ───────────────────────────────────────────────────
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ─── ERROR ───────────────────────────────────────────────────
function showError(msg) {
  document.getElementById('spinner').style.display = 'none';
  const viewer = document.getElementById('viewer');
  viewer.innerHTML = `
    <div class="err">
      <div class="err-icon">📷</div>
      <div class="err-title">No Photos Found</div>
      <div class="err-sub">${msg}</div>
    </div>`;
}

init();
</script>
</body>
</html>
